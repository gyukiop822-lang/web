<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Pinterest Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS murni untuk efek Masonry layaknya Pinterest */
    .masonry-grid {
      column-count: 2;
      column-gap: 1rem;
    }
    @media (min-width: 640px) { .masonry-grid { column-count: 3; } }
    @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }
    @media (min-width: 1280px) { .masonry-grid { column-count: 5; } }
    
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }
    
    /* Loader Spinner */
    .loader {
      border-top-color: #3498db;
      -webkit-animation: spinner 1.5s linear infinite;
      animation: spinner 1.5s linear infinite;
    }
    @keyframes spinner {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

  <!-- Navbar -->
  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-900">My Gallery</h1>
      <div class="w-full max-w-xs ml-4">
        <input type="text" id="searchInput" placeholder="Cari galeri..." 
               class="w-full px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="galleryGrid" class="masonry-grid">
      <!-- Gambar akan di-inject ke sini oleh JavaScript -->
    </div>
    
    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="flex justify-center items-center py-8 hidden">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    </div>
  
  </main>

  <!-- Modal -->
  <div id="imageModal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-90 flex justify-center items-center opacity-0 transition-opacity duration-300">
    <button id="closeModal" class="absolute top-4 right-4 text-white text-4xl font-bold hover:text-gray-300 focus:outline-none">&times;</button>
    <div class="max-w-4xl max-h-screen p-4 flex flex-col items-center">
      <img id="modalImage" src="" alt="" class="max-h-[85vh] object-contain rounded-lg shadow-2xl">
      <p id="modalTitle" class="text-white mt-4 text-xl font-medium"></p>
    </div>
  </div>

  <script>
    // --- GANTI URL INI DENGAN URL WEB APP GAS ANDA ---
    const API_URL = "https://script.google.com/macros/s/AKfycbzQm0cAz_1j6L2bYwo8aXom_J6V6m16Tv4f3KbpOaMb-jJwM66hne19zUCNWKUInm3LzA/exec"; 
    
    let isFetching = false;
    let currentSearch = "";

    const galleryGrid = document.getElementById('galleryGrid');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const searchInput = document.getElementById('searchInput');

    // Komponen Modal
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');

    // Fungsi Fetch Data (Meminta SEMUA data sekaligus menggunakan all=true)
    async function fetchAllImages(search = "") {
      if (isFetching) return;
      isFetching = true;
      loadingIndicator.classList.remove('hidden');
      galleryGrid.innerHTML = ''; // Kosongkan grid sebelum memuat baru

      try {
        const response = await fetch(`${API_URL}?all=true&search=${encodeURIComponent(search)}`);
        const result = await response.json();

        if (result.status === "success") {
          renderImages(result.data);
        } else {
          console.error("API Error:", result.message);
        }
      } catch (error) {
        console.error("Fetch Error:", error);
      } finally {
        isFetching = false;
        loadingIndicator.classList.add('hidden');
      }
    }

    // Fungsi Render DOM
    function renderImages(images) {
      images.forEach(img => {
        if (!img.thumbnailUrl) return; 

        const itemDiv = document.createElement('div');
        itemDiv.className = 'masonry-item relative group overflow-hidden rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 cursor-pointer';
        
        // Gunakan thumbnailUrl untuk grid agar loading sangat cepat
        itemDiv.innerHTML = `
          <img src="${img.thumbnailUrl}" alt="${img.filename}" class="w-full h-auto object-cover opacity-0 transition-opacity duration-500 transform group-hover:scale-105 transition-transform duration-500" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" onerror="this.closest('.masonry-item').remove()">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
            <h3 class="text-white font-semibold text-sm truncate">${img.galleryTitle}</h3>
          </div>
        `;

        // Kirim fullUrl ke modal agar gambar HD muncul saat di-klik
        itemDiv.addEventListener('click', () => openModal(img.fullUrl, img.galleryTitle));
        galleryGrid.appendChild(itemDiv);
      });
    }

    // Fitur Pencarian (Debounced)
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = e.target.value.trim();
        if (query !== currentSearch) {
          currentSearch = query;
          fetchAllImages(currentSearch);
        }
      }, 500);
    });

    // Kontrol Modal
    function openModal(src, title) {
      modalImage.src = src;
      modalTitle.textContent = title;
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10); 
    }

    closeModal.addEventListener('click', () => {
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
        modalImage.src = '';
      }, 300);
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal.click();
    });

    // Initial Load - Langsung tarik semua data
    fetchAllImages(currentSearch);
  </script>
</html>
